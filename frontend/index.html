<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>Aura Hackathon</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;margin:0;padding:40px;background:#fafafa;text-align:center}
    h1{color:#333}
    button{padding:10px 20px;font-size:16px;border:none;border-radius:4px;background:#1890ff;color:#fff;cursor:pointer}
    button:hover{background:#40a9ff}
    #result{margin-top:20px;color:#52c41a}
  </style>
</head>
<body>
  <h1>Aura Hackathon Platform</h1>
  <button onclick="ping()">Test API</button>
  <div id="result"></div>

  <script>
    async function ping() {
      const res = await fetch('/api/ping');
      const data = await res.json();
      document.getElementById('result').innerText = JSON.stringify(data);
    }
  </script>
</body>
</html>
