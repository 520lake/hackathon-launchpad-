version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aura_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aura_password}
      POSTGRES_DB: ${POSTGRES_DB:-aura_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aura_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aura_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aura_user}:${POSTGRES_PASSWORD:-aura_password}@db:5432/${POSTGRES_DB:-aura_db}
      - SECRET_KEY=${SECRET_KEY:-change_this_secret_key}
      - BACKEND_CORS_ORIGINS=["http://localhost", "https://yourdomain.com"]
      # Add other env vars from .env.example here
    volumes:
      - ./uploads:/app/uploads
    networks:
      - aura_network
    expose:
      - "8000"

  # Frontend Service (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      # Mount SSL certs here
      # - ./certs:/etc/nginx/certs
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - aura_network

networks:
  aura_network:
    driver: bridge

volumes:
  postgres_data:
