version: "3.8"

services:
  # Backend Service (uses SQLite db file)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    environment:
      - DATABASE_URL=sqlite:///./vibebuild.db
      - SECRET_KEY=${SECRET_KEY:-change_this_secret_key}
      - BACKEND_CORS_ORIGINS=["http://localhost", "https://yourdomain.com"]
      # Add other env vars from .env.example here
    volumes:
      # Persist and share the SQLite database file used by the backend
      - ./vibebuild.db:/app/vibebuild.db
      - ./uploads:/app/uploads
    networks:
      - aura_network
    expose:
      - "8000"

  # Frontend Service (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      # Mount SSL certs here
      # - ./certs:/etc/nginx/certs
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - aura_network

networks:
  aura_network:
    driver: bridge
